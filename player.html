<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA 2026 SQUAD CENTER PRO</title>
    <style>
        :root {
            --bg-main: #060913;
            --bg-card: #0f1626;
            --bg-tab: #141d30;
            --border-color: #1e293b;
            --text-pure: #ffffff;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            
            /* 20260605_233709.jpg 핵심 네온 컬러 포인트 */
            --neon-cyan: #38bdf8;
            --neon-mint: #10b981;
            --neon-green: #00f5d4;
            
            /* 포지션 대시보드용 포인트 라인 */
            --gk-glow: #ef4444;
            --df-glow: #10b981;
            --mf-glow: #3b82f6;
            --fw-glow: #f59e0b;
        }

        body {
            font-family: 'Pretendard', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            /* 테크니컬 그리드 배경 패턴 구현 */
            background-image: linear-gradient(rgba(30, 41, 59, 0.15) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(30, 41, 59, 0.15) 1px, transparent 1px);
            background-size: 24px 24px;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* 최상단 메타 배너 라인 */
        .meta-status-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 25px;
        }

        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--neon-mint);
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge::before {
            content: "";
            width: 6px;
            height: 6px;
            background-color: var(--neon-mint);
            border-radius: 50%;
            display: inline-block;
        }

        /* 메인 대시보드 헤더 스타일 */
        header {
            margin-bottom: 35px;
            position: relative;
        }

        .sub-tag {
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--neon-mint);
            font-size: 0.75rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        header h1 {
            color: var(--neon-cyan);
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            margin: 0 0 12px 0;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
            margin: 0;
            max-width: 600px;
        }

        /* 피파 랭킹 순 국가 선택 네비게이션 그리드 */
        .tabs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px;
            margin-bottom: 35px;
        }

        .tab-btn {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .tab-btn:hover {
            border-color: var(--neon-cyan);
            background-color: var(--bg-tab);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #047857 0%, #10b981 100%);
            border-color: var(--neon-green);
            color: var(--text-pure);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .tab-btn .rank-no {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        .tab-btn.active .rank-no {
            color: rgba(255, 255, 255, 0.7);
        }

        /* 컨텐츠 출력 전용 보드 패널 */
        .dashboard-board {
            background-color: rgba(15, 22, 38, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        .country-title-area {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-pure);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* 포지션 그룹 섹션 라인 */
        .position-container {
            margin-bottom: 40px;
        }

        .position-label {
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pos-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        /* 포지션 고유 글로우 매핑 */
        .dot-gk { background-color: var(--gk-glow); box-shadow: 0 0 8px var(--gk-glow); }
        .dot-df { background-color: var(--df-glow); box-shadow: 0 0 8px var(--df-glow); }
        .dot-mf { background-color: var(--mf-glow); box-shadow: 0 0 8px var(--mf-glow); }
        .dot-fw { background-color: var(--fw-glow); box-shadow: 0 0 8px var(--fw-glow); }

        /* 대시보드형 스쿼드 카드 레이아웃 */
        .squad-matrix {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }

        .squad-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.2s ease;
        }

        .squad-card:hover {
            border-color: var(--neon-cyan);
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.1);
        }

        .jersey-index {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--neon-cyan);
            background: rgba(56, 189, 248, 0.08);
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 1px solid rgba(56, 189, 248, 0.15);
        }

        .meta-profile {
            display: flex;
            flex-direction: column;
        }

        .p-name {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-pure);
        }

        .p-club {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 3px;
        }
    </style>
</head>

        { key: "DF", title: "수비수 / DEFENDER", glow: "dot-df" },
        { key: "MF", title: "미드필더 / MIDFIELDER", glow: "dot-mf" },
        { key: "FW", title: "공격수 / FORWARD", glow: "dot-fw" }
    ];

    window.addEventListener('DOMContentLoaded', () => {
        const tabsBox = document.getElementById('tabsBox');
        let firstCode = "";

        Object.keys(worldCupSquads).forEach((code, index) => {
            if(index === 0) firstCode = code;
            const country = worldCupSquads[code];
            
            const btn = document.createElement('button');
            btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
            btn.innerHTML = `
                <span class="rank-no">FIFA RANK ${country.rank}</span>
                <span>${country.flag} ${country.name}</span>
            `;
            btn.onclick = (e) => switchDashboard(code, e.currentTarget);
            tabsBox.appendChild(btn);
        });

        renderDashboard(firstCode);
    });

    function switchDashboard(code, targetBtn) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        targetBtn.classList.add('active');
        renderDashboard(code);
    }

    function renderDashboard(code) {
        const country = worldCupSquads[code];
        document.getElementById('countryTitle').innerHTML = `
            <span>${country.flag}</span>
            <span>${country.name} National Team Squad</span>
        `;

        const displayArea = document.getElementById('squadDisplay');
        displayArea.innerHTML = ""; 

        positionConfig.forEach(pos => {
            const players = country[pos.key] || [];
            if(players.length === 0) return;

            const container = document.createElement('div');
            container.className = "position-container";

            container.innerHTML = `
                <div class="position-label">
                    <span class="pos-dot ${pos.glow}"></span>
                    <span>${pos.title}</span>
                </div>
            `;

            const matrix = document.createElement('div');
            matrix.className = "squad-matrix";

            players.forEach(p => {
                const card = document.createElement('div');
                card.className = "squad-card";
                card.innerHTML = `
                    <div class="jersey-index">${p.n}</div>
                    <div class="meta-profile">
                        <span class="p-name">${p.p}</span>
                        <span class="p-club">${p.c}</span>
                    </div>
                `;
                matrix.appendChild(card);
            });

            container.appendChild(matrix);
            displayArea.appendChild(container);
        });
    }
